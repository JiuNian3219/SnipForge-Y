name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact-name: snipforge-macos
          - os: windows-latest
            artifact-name: snipforge-windows
          - os: ubuntu-latest
            artifact-name: snipforge-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          if-no-files-found: error
          retention-days: 7
          path: |
            release/**/*.dmg
            release/**/*.dmg.blockmap
            release/**/*.exe
            release/**/*.exe.blockmap
            release/**/*.AppImage
            release/**/*.AppImage.blockmap
            release/**/*.deb
            release/**/*.rpm
            release/**/*.zip
            release/**/*.yml

  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 5 -type f | sort

      - name: Create GitHub draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SnipForge ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.dmg.blockmap
            release-assets/**/*.exe
            release-assets/**/*.exe.blockmap
            release-assets/**/*.AppImage
            release-assets/**/*.AppImage.blockmap
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/**/*.zip
            release-assets/**/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
